<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS实现固定宽高比响应式布局</title>
    <style>  body {
        padding: 0;
        margin: 0;
        background-color: #f5f5f5;
    }

    p {
        margin: 0;
    }

    .testMain {
        width: 80%;
        height: 500px;
        margin: 20px auto;
        background-color: #fff;
        display: flex;
        flex-shrink: 0;
        flex-wrap: wrap;
        align-content: flex-start;
    }

    .item2 {
        width: 33%;
        margin-right: 0.5%;
        margin-bottom: 0.5%;
        box-sizing: border-box;
        border: 1px solid #999999;
        position: relative;
    }

    .item2:nth-child(3n) {
        margin-right: 0;
    }

    .item2Inner {
        padding: 12px;
        display: flex;
    }

    .item2Inner-pic {
        width: 40%;
        height: 0;
        padding-top: 30%;
        background: url('./ratio_2-1.png') center center no-repeat;
        background-size: cover;
        flex-shrink: 0;
    }

    .item2Inner-main {
        flex: 1;
        margin-left: 10px;
    }

    .item2Inner-main-title {
        font-size: 14px;
        color: #333;
        line-height: 2;
    }

    .item2Inner-main-txt {
        font-size: 12px;
        color: #666;
        line-height: 2;
    }
    </style>
</head>
<body>
<div style="margin-top: 20px;">用一个宽度为80%的盒子代替右侧自适应宽度的布局</div>
<div id="app" class="  testMain">
    <div class="item2" v-for="i in 10">
        <div class="item2Inner">
            <div class="item2Inner-pic"></div>
            <div class="item2Inner-main">
                <p class="item2Inner-main-title">标题</p>
                <p class="item2Inner-main-txt">这是一段测试文字</p>
            </div>
        </div>
    </div>
</div>
</body>
<script src="https://unpkg.com/vue/dist/vue.js"></script>

<script type="text/javascript">
    new Vue({
        el: "#app",
        data: {}
    })
</script>

</html>
