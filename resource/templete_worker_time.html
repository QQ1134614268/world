<!DOCTYPE html>

<head>
    <title>mail</title>
    <style>
        .mail {
            width: 100%;
            height: 580px;
            background-color: rgba(57, 179, 255, 0.8);
            font-family: 'Arial', Courier, monospace;
            font-size: 28px;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .mail-item {
            margin-top: 50px;
        }

        .info {
            display: flex;
            flex-direction: row;
            margin-top: 20px;
        }

        .info_left {
            width: 500px;
            height: 300px;
            margin-left: 120px;
        }

        .info_right {
            text-align: left;
            width: 670px;
            height: 300px;
            margin-left: 50px;
        }

        .message {
            font-size: 26px;
            margin-top: 20px;
            margin-left: 30px;
            padding: 5px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .para {
            height: 70px;
        }

        .para>input {
            padding-left: 5px;
        }

        .send {
            color: #39B3FF;
            background-color: white;
            border: thin;
            font-size: 26px;
            width: 100px;
            height: 45px;
            margin-left: 980px;
        }

        .input {
            width: 230px;
            height: 28px;
            font-size: 24px;
        }

        .feedback {
            width: 100%;
            height: 80px;
            font-family: 'Arial', Courier, monospace;
            font-size: 35px;
            font-weight: 900;
            text-align: center;
            background-color: white;
            color: #39B3FF;
        }
    </style>
</head>

<body>
    <div class="mail" id="info">
        <form id="form">
            <div class="mail-item">
                <div class="text">
                    <p><br style="line-height: 30px" />You can also email us at: abcde@163.com or fill in our contact form:</p>
                </div>

                <div class="info">
                    <div class="info_left">
                        <p class="para">NAME &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <input type="text" class="input" name="user_name" id="user_name" placeholder="NAME">
                        </p>
                        <p class="para">EMAIL &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <input type="text" class="input" name="user_email" id="user_email" placeholder="EMAIL">
                        </p>
                        <p class="para">SUBJECT &nbsp;&nbsp;
                            <input type="text" class="input" name="user_subject" id="user_subject" placeholder="SUBJECT">
                        </p>
                    </div>
                    <div class="info_right ">
                        <textarea class="message" name="user_message" id="user_message" cols="45" rows="8" placeholder="MESSAGE"></textarea>
                    </div>
                </div>

                <button class="send" id="send" onclick="sendVal()">Send</button>
            </div>
        </form>
    </div>
    <div class="feedback" id="feedback">
        <p>Looking forward to your feedback!</p>
    </div>
</body>
<script src="http://cdn.bootcss.com/jquery/1.11.3/jquery.min.js"></script>
<script type="text/javascript">
    function sendVal() {
        console.log("hi")
        let sendData = new FormData($("#form")[0])
        $.ajax({
            url: 'http://127.0.0.1:5000/email',
            type: 'POST',
            data: sendData,
            async: false,
            cache: false,
            contentType: false,
            processData: false,
            success: function(returndata) {
                alert(returndata);
            },
            error: function(error) {
                alert(error);
            }
        })
    }
</script>
